<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#00d4ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>ATLAS</title>
  <link rel="manifest" href="/static/manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --accent: #00d4ff;
      --accent-dim: #007a99;
      --text: #e8e8e8;
      --text-dim: #888;
      --user-bubble: #1a2e35;
      --atlas-bubble: #141414;
      --danger: #ff4444;
      --radius: 16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100dvh; }

    /* ── Header ── */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #header h1 { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
    #status-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #444; transition: background .3s;
    }
    #status-dot.online { background: #4caf50; }
    #status-dot.error  { background: var(--danger); }

    /* ── Quick actions ── */
    #quick-bar {
      display: flex; gap: 6px; padding: 8px 12px; overflow-x: auto;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0; scrollbar-width: none;
    }
    #quick-bar::-webkit-scrollbar { display: none; }
    .qa-btn {
      flex-shrink: 0; padding: 5px 12px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text-dim); font-size: 12px; cursor: pointer;
      white-space: nowrap; transition: border-color .2s, color .2s;
    }
    .qa-btn:hover, .qa-btn:active { border-color: var(--accent); color: var(--accent); }

    /* ── Messages ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 16px 12px;
      display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }

    .msg { max-width: 85%; display: flex; flex-direction: column; gap: 3px; }
    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.atlas { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px; border-radius: var(--radius);
      line-height: 1.5; word-break: break-word; white-space: pre-wrap;
    }
    .msg.user  .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; }
    .msg.atlas .bubble { background: var(--atlas-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    .msg-label { font-size: 10px; color: var(--text-dim); padding: 0 4px; }

    /* typing indicator */
    .typing .bubble { display: flex; gap: 5px; align-items: center; padding: 14px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-dim); animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    /* ── Input area ── */
    #input-area {
      flex-shrink: 0;
      padding: 10px 12px calc(10px + var(--safe-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: flex-end;
    }
    #msg-input {
      flex: 1; resize: none; background: var(--bg);
      border: 1px solid var(--border); border-radius: 12px;
      color: var(--text); font-size: 15px; padding: 10px 12px;
      max-height: 120px; outline: none; font-family: inherit;
      line-height: 1.4; transition: border-color .2s;
    }
    #msg-input:focus { border-color: var(--accent-dim); }
    #msg-input::placeholder { color: var(--text-dim); }

    .icon-btn {
      flex-shrink: 0; width: 42px; height: 42px;
      border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: background .2s, transform .1s;
    }
    .icon-btn:active { transform: scale(.9); }

    #mic-btn  { background: var(--border); color: var(--text); }
    #mic-btn.recording { background: var(--danger); color: #fff; animation: pulse 1s infinite; }
    #send-btn { background: var(--accent); color: #000; }
    #tts-btn  { background: var(--border); color: var(--text); }
    #tts-btn.active { background: var(--accent-dim); color: #fff; }

    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,68,68,.5)} 50%{box-shadow:0 0 0 8px rgba(255,68,68,0)} }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 8px 18px; border-radius: 20px;
      font-size: 13px; opacity: 0; pointer-events: none; transition: opacity .3s;
      z-index: 100;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>ATLAS</h1>
    <div id="status-dot" title="Server connection"></div>
  </div>

  <div id="quick-bar">
    <button class="qa-btn" data-cmd="briefing">📋 Briefing</button>
    <button class="qa-btn" data-cmd="calendar">📅 Calendar</button>
    <button class="qa-btn" data-cmd="notes list">📝 Notes</button>
    <button class="qa-btn" data-cmd="insights">💡 Insights</button>
    <button class="qa-btn" data-cmd="smart home">🏠 Home</button>
    <button class="qa-btn" data-cmd="email">📧 Email</button>
    <button class="qa-btn" data-cmd="diagnostics">🔧 Diagnostics</button>
    <button class="qa-btn" data-cmd="help">❓ Help</button>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <button id="mic-btn" class="icon-btn" title="Voice input">🎙</button>
    <textarea id="msg-input" rows="1" placeholder="Message ATLAS…" autocomplete="off" spellcheck="true"></textarea>
    <button id="tts-btn" class="icon-btn" title="Toggle voice reply">🔊</button>
    <button id="send-btn" class="icon-btn" title="Send">➤</button>
  </div>
</div>
<div id="toast"></div>

<script>
"use strict";

// ── State ────────────────────────────────────────────────────────────────────
const state = {
  ttsEnabled: localStorage.getItem("atlas_tts") !== "0",
  recording: false,
  recognition: null,
};

// ── Elements ─────────────────────────────────────────────────────────────────
const msgList   = document.getElementById("messages");
const input     = document.getElementById("msg-input");
const sendBtn   = document.getElementById("send-btn");
const micBtn    = document.getElementById("mic-btn");
const ttsBtn    = document.getElementById("tts-btn");
const statusDot = document.getElementById("status-dot");
const toast     = document.getElementById("toast");

// ── Toast ─────────────────────────────────────────────────────────────────────
let _toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => toast.classList.remove("show"), 2500);
}

// ── TTS (Web Speech Synthesis) ────────────────────────────────────────────────
function speak(text) {
  if (!state.ttsEnabled || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate  = 1.05;
  utt.pitch = 0.9;
  window.speechSynthesis.speak(utt);
}

function updateTtsBtn() {
  ttsBtn.classList.toggle("active", state.ttsEnabled);
  ttsBtn.title = state.ttsEnabled ? "Voice reply ON" : "Voice reply OFF";
}
updateTtsBtn();

ttsBtn.addEventListener("click", () => {
  state.ttsEnabled = !state.ttsEnabled;
  localStorage.setItem("atlas_tts", state.ttsEnabled ? "1" : "0");
  updateTtsBtn();
  showToast(state.ttsEnabled ? "Voice reply enabled" : "Voice reply disabled");
});

// ── Voice input (Google Speech Recognition via Web Speech API) ────────────────
// On Android Chrome, window.webkitSpeechRecognition is backed by Google's
// cloud Speech-to-Text engine. Interim results stream in real time as you speak.
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

// Human-readable messages for every Google STT error code
const STT_ERRORS = {
  "not-allowed":       "Microphone access denied. Allow it in Chrome → Site Settings.",
  "network":           "Network error — Google Speech needs an internet connection.",
  "no-speech":         "No speech detected. Try speaking louder or closer to the mic.",
  "audio-capture":     "Microphone not found. Check your device audio settings.",
  "service-not-allowed": "Speech service blocked. Try reloading the page.",
  "bad-grammar":       "Unrecognised speech grammar configuration.",
  "language-not-supported": "Language not supported by Google Speech.",
  "aborted":           "Recognition was aborted.",
};

// Detect saved language preference (default: browser language or en-US)
const _savedLang = localStorage.getItem("atlas_stt_lang") ||
                   navigator.language || "en-US";

// Track whether the final result was already sent so onend doesn't double-fire
let _finalSent = false;

if (SpeechRecognition) {
  const rec = new SpeechRecognition();
  rec.lang            = _savedLang;
  rec.interimResults  = true;   // stream partial results live into the input
  rec.maxAlternatives = 1;
  rec.continuous      = false;  // one utterance per tap — cleaner for commands

  // Stream interim text into the input in real time, send on final result
  rec.onresult = (e) => {
    let interimText = "";
    let finalText   = "";

    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalText += t;
      else interimText += t;
    }

    if (finalText.trim()) {
      // Final: fill the input, auto-resize, then send
      input.value = finalText.trim();
      autoResize();
      _finalSent = true;
      stopRecording();
      sendMessage(finalText.trim());
    } else if (interimText) {
      // Interim: show a live preview in the input (italic-style via placeholder)
      input.value = interimText;
      input.style.fontStyle = "italic";
      input.style.color = "var(--text-dim)";
      autoResize();
    }
  };

  rec.onerror = (e) => {
    const msg = STT_ERRORS[e.error] || ("Speech error: " + e.error);
    showToast(msg);
    stopRecording();
  };

  rec.onend = () => {
    // If recognition ended without a final result (e.g. user tapped stop mid-word),
    // keep whatever text is in the box so the user can edit before sending.
    if (!_finalSent && input.value.trim()) {
      input.style.fontStyle = "";
      input.style.color = "";
      // Don't auto-send — user stopped deliberately; let them edit or tap send
    } else if (!_finalSent) {
      input.value = "";
      input.style.fontStyle = "";
      input.style.color = "";
      autoResize();
    }
    stopRecording();
  };

  state.recognition = rec;
} else {
  micBtn.style.display = "none";
}

function startRecording() {
  if (!state.recognition || state.recording) return;
  _finalSent = false;
  // Reset input styling from any previous interim text
  input.style.fontStyle = "";
  input.style.color = "";
  state.recognition.lang = localStorage.getItem("atlas_stt_lang") ||
                            navigator.language || "en-US";
  state.recognition.start();
  state.recording = true;
  micBtn.classList.add("recording");
  micBtn.title = "Listening… tap to stop";
  input.placeholder = "Listening…";
}

function stopRecording() {
  if (!state.recording) return;
  state.recording = false;
  micBtn.classList.remove("recording");
  micBtn.title = "Voice input (Google Speech)";
  input.placeholder = "Message ATLAS…";
  // Restore input text style in case we stopped during interim
  input.style.fontStyle = "";
  input.style.color = "";
  try { state.recognition && state.recognition.stop(); } catch (_) {}
}

micBtn.addEventListener("click", () => {
  if (state.recording) stopRecording();
  else startRecording();
});

// ── Server status ─────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch("/health", { cache: "no-store" });
    statusDot.className = r.ok ? "online" : "error";
  } catch {
    statusDot.className = "error";
  }
}
checkHealth();
setInterval(checkHealth, 30_000);

// ── Message rendering ─────────────────────────────────────────────────────────
function appendMsg(role, text, id) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  if (id) div.id = id;

  const label = document.createElement("div");
  label.className = "msg-label";
  label.textContent = role === "user" ? "You" : "ATLAS";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  div.appendChild(label);
  div.appendChild(bubble);
  msgList.appendChild(div);
  msgList.scrollTop = msgList.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement("div");
  div.className = "msg atlas typing";
  div.id = "_typing";
  div.innerHTML = `<div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgList.appendChild(div);
  msgList.scrollTop = msgList.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("_typing");
  if (t) t.remove();
}

// ── API ───────────────────────────────────────────────────────────────────────
async function sendMessage(text) {
  const trimmed = (text || input.value).trim();
  if (!trimmed) return;

  input.value = "";
  autoResize();
  appendMsg("user", trimmed);
  showTyping();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: trimmed, speak: false }),
    });
    const data = await res.json();
    removeTyping();
    const reply = data.response || data.detail || "No response.";
    appendMsg("atlas", reply);
    speak(reply);
  } catch (err) {
    removeTyping();
    const msg = "Connection error — is the ATLAS server running?";
    appendMsg("atlas", msg);
  }
}

// ── Input auto-resize & submit ────────────────────────────────────────────────
function autoResize() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 120) + "px";
}

input.addEventListener("input", autoResize);

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener("click", () => sendMessage());

// ── Quick actions ─────────────────────────────────────────────────────────────
document.querySelectorAll(".qa-btn").forEach((btn) => {
  btn.addEventListener("click", () => sendMessage(btn.dataset.cmd));
});

// ── Service Worker ────────────────────────────────────────────────────────────
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/static/sw.js").catch(() => {});
}

// ── Welcome message ───────────────────────────────────────────────────────────
appendMsg("atlas", "Hello. I'm ATLAS. How can I assist you today?\nTry \"briefing\", \"plan my day\", or tap a quick action above.");
</script>
</body>
</html>
